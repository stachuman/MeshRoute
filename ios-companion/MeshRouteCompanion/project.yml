name: MeshRouteCompanion
options:
  bundleIdPrefix: eu.meshroute
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  MeshRouteKit:
    path: ../MeshRouteKit

targets:
  MeshRouteCompanion:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
    dependencies:
      - package: MeshRouteKit
        product: MeshRouteWire
      - package: MeshRouteKit
        product: MeshRouteCore
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: MeshRoute
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSBluetoothAlwaysUsageDescription: "MeshRoute connects to your node over Bluetooth to read and send messages and read its status."
        NSCameraUsageDescription: "MeshRoute uses the camera to scan a peer's contact QR card."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: eu.meshroute.companion
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_PREVIEWS: YES
        # Signing: the Simulator needs none. To run on a real iPhone, use automatic signing and set
        # your team — either pick it in Xcode (target ▸ Signing & Capabilities ▸ Team), or paste your
        # 10-char Team ID into DEVELOPMENT_TEAM below (that way it survives `xcodegen generate`).
        # A FREE Apple ID works (no paid Developer Program needed). Command-line Simulator builds still
        # pass CODE_SIGNING_ALLOWED=NO explicitly, so they don't need a team.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
