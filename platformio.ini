; MeshRoute — C++ port of the dv_dual_sf LoRa-mesh protocol.
;
; Spec of record: spec/dv_dual_sf.lua (symlinked to
; /home/staszek/lora-universal-simulator/scenarios/dv_dual_sf.lua).
; Touching protocol constants is a wire change — rebuild the suite.
;
; RF plan (memory: project-band-choice):
;   869.4625 MHz / SF8 / BW125 / CR4/5 / 10% duty / EU868 g3 sub-band.
;
; Envs:
;   native        — host build for tests + sim driver (no radio)
;   xiao_sx1262   — Seeed XIAO nRF52840 + Wio-SX1262 shield (primary target)
;   heltec_v3     — ESP32-S3 Heltec WiFi LoRa 32 V3 (backup target)

[platformio]
default_envs = native

; ----- Shared compile flags + LoRa plan -----
[common]
build_flags =
  -std=gnu++20
  -Wall -Wextra
  -fno-exceptions
  -fno-rtti
  -DPROTOCOL_VERSION=1
  -DLORA_FREQ_HZ=869462500
  -DLORA_BW_HZ=125000
  -DLORA_SF=8
  -DLORA_CR=5
  -DLORA_PREAMBLE_SYM=16
  -DLORA_DUTY_CYCLE_PCT=10

; ----- Native host build (tests + sim driver) -----
[env:native]
platform = native
build_type = debug
test_framework = doctest
; Tests link lib/core only (codecs, airtime, constants) — they don't need src/.
; Building src/ into the test program would drag sim_main.cpp's main() in and
; clash with the doctest runner's main. `pio run -e native` still builds the
; sim driver (test_build_src affects test builds only).
test_build_src = no
build_src_filter = +<sim_main.cpp> -<fw_main.cpp>
build_flags =
  ${common.build_flags}
  -DMESHROUTE_NATIVE=1
  -g -O0
lib_deps =
  doctest/doctest @ ^2.4.11

; ----- Seeed XIAO nRF52840 + Wio-SX1262 -----
[env:xiao_sx1262]
platform = nordicnrf52
board = xiao_ble_sense
framework = arduino
build_src_filter = +<fw_main.cpp> -<sim_main.cpp>
upload_protocol = nrfutil
debug_tool = cmsis-dap
debug_init_break = tbreak setup
build_flags =
  ${common.build_flags}
  -DBOARD_XIAO_WIO_SX1262
  -DLORA_PIN_NSS=4
  -DLORA_PIN_BUSY=3
  -DLORA_PIN_RST=2
  -DLORA_PIN_DIO1=1
lib_deps =
  jgromes/RadioLib @ ^7.6.0
  rweather/Crypto @ ^0.4.0

; ----- Heltec WiFi LoRa 32 V3 (backup) -----
[env:heltec_v3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
build_src_filter = +<fw_main.cpp> -<sim_main.cpp>
upload_protocol = esptool
build_flags =
  ${common.build_flags}
  -DBOARD_HELTEC_V3
  -DLORA_PIN_NSS=8
  -DLORA_PIN_BUSY=13
  -DLORA_PIN_RST=12
  -DLORA_PIN_DIO1=14
lib_deps =
  jgromes/RadioLib @ ^7.6.0
  rweather/Crypto @ ^0.4.0
