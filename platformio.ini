; MeshRoute — C++ port of the dv_dual_sf LoRa-mesh protocol.
;
; Spec of record: spec/dv_dual_sf.lua (symlinked to
; /home/staszek/lora-universal-simulator/scenarios/dv_dual_sf.lua).
; Touching protocol constants is a wire change — rebuild the suite.
;
; RF plan (memory: project-band-choice):
;   869.4625 MHz / SF8 / BW125 / CR4/5 / 10% duty / EU868 g3 sub-band.
; NB: freq/BW/SF are RUNTIME node config (the protocol retunes SF live); the
; LORA_* macros below are only the std_init() bring-up defaults + banner prints.
; Units match CustomSX1262::std_init: LORA_FREQ in MHz, LORA_BW in kHz.
;
; Envs:
;   native        — host build for tests + sim driver (no radio)
;   xiao_sx1262   — Seeed XIAO nRF52840 + Wio-SX1262 shield (primary target)
;   heltec_v3     — ESP32-S3 Heltec WiFi LoRa 32 V3 (backup target)

[platformio]
default_envs = native

; ----- Shared compile flags + LoRa plan -----
[common]
build_flags =
  -std=gnu++2a                ; = C++20. Use the gnu++2a spelling (not gnu++20): GCC<10 (shipped by some
                              ; PlatformIO ESP32/xtensa installs) only knows gnu++2a; GCC 8..13+ all accept it.
  -Wall -Wextra
  -fno-exceptions
  -fno-rtti
  -DPROTOCOL_VERSION=1
  -DLORA_FREQ=869.4625        ; MHz  — std_init begin() + banners
  -DLORA_BW=125.0             ; kHz  — std_init begin()
  -DLORA_SF=8
  -DLORA_CR=5
  -DLORA_TX_POWER=22          ; dBm  — std_init begin() (cap to g3 ERP limit)
  -DLORA_PREAMBLE_SYM=16
  -DLORA_DUTY_CYCLE_PCT=10

; ----- Native host build (tests + sim driver) -----
[env:native]
platform = native
build_type = debug
test_framework = doctest
; Tests link lib/core + lib/hal (codecs, airtime, constants) — they don't need
; src/. Building src/ into the test program would drag sim_main.cpp's main() in
; and clash with the doctest runner's main. `pio run -e native` still builds the
; sim driver (test_build_src affects test builds only).
test_build_src = no
build_src_filter = +<sim_main.cpp> -<fw_main.cpp>
; The vendored MeshCore PHY header pulls <RadioLib.h>, which has no native
; backend — keep it out of the host build entirely.
lib_ignore = meshcore
build_flags =
  ${common.build_flags}
  -DMESHROUTE_NATIVE=1
  -DMR_N_LAYERS=2               ; the host test env exercises BOTH single- AND dual-layer logic, so it
                               ; allocates 2 LayerRuntimes (host RAM is free). Keeps the _layers[] array at
                               ; size 2 = byte-identical to the pre-RAM-fix Slice-2a binary (the no-op proof).
  -g -O0
lib_deps =
  doctest/doctest @ ^2.4.11

; ----- Seeed XIAO nRF52840 + Wio-SX1262 (primary) -----
[env:xiao_sx1262]
; PIN the platform version (was unpinned) so every machine resolves the SAME builder + default
; toolchain. A newer nordicnrf52 ships GCC 13/14, where the SoftDevice SVCALL macro (a naked
; function with EXTENDED inline asm) is a HARD ERROR (hundreds of nrf_svc.h failures); the pinned
; GCC 12.3.1 below still allows it. 10.11.0 is the version verified to build the XIAO here.
platform = nordicnrf52 @ 10.11.0
; Custom board def vendored from MeshCore into boards/ (Adafruit nRF52 core,
; S140 v7.3.0) — the stock `xiao_ble_sense` id does not exist.
board = seeed-xiao-afruitnrf52-nrf52840
board_build.ldscript = boards/nrf52840_s140_v7.ld
framework = arduino
; lib/hal (timer_wheel/device_hal/iradio) #include "hal.h" from lib/core (MeshRouteCore). The default
; `chain` LDF does not reliably add lib/core to lib/hal's include path on every OS (works on Linux, FAILS
; on Windows -> 'TxResult does not name a type'). deep+ scans all libs + evaluates #if so the cross-lib
; dependency is always resolved (+ lib/hal/library.json declares it explicitly).
lib_ldf_mode = deep+
; Emit firmware.uf2 (the nrfutil build only makes .hex/.zip). Drop the .uf2 onto the XIAO-SENSE
; bootloader drive (double-tap RESET) — the no-COM-port first-flash path. See tools/uf2_postbuild.py.
extra_scripts = post:tools/uf2_postbuild.py
; The stock nordicnrf52 toolchain is GCC 7.2.1 — too old for C++20 (lib/core
; uses <span>). Bump to GCC 12.3 so the shared core compiles for ARM too.
platform_packages =
  framework-arduinoadafruitnrf52 @ 1.10700.0
  platformio/toolchain-gccarmnoneeabi @ 1.120301.0
; The BSP has no Seeed XIAO variant — compile our vendored variant.cpp (defines
; g_ADigitalPinMap) alongside the firmware source.
build_src_filter = +<fw_main.cpp> -<sim_main.cpp> +<../variants/Seeed_XIAO_nRF52840/variant.cpp>
upload_protocol = nrfutil
; The firmware runs Serial at 115200 (fw_main: Serial.begin(115200)); without this, `pio device
; monitor` opens at 9600 and the console looks empty/garbled.
monitor_speed = 115200
debug_tool = cmsis-dap
debug_init_break = tbreak setup
; The Adafruit nRF52 builder appends -std=gnu++11 last on our TUs, overriding
; the common -std=gnu++2a (lib/core needs C++14+ constexpr / C++20 <span>).
; Strip it so our gnu++2a wins; framework libs keep their own gnu++17.
build_unflags = -std=gnu++11
build_flags =
  ${common.build_flags}
  -DMESHROUTE_NO_TELEMETRY        ; strip the diagnostic emit blocks (MR_TELEMETRY) from the device build
  -DRADIOLIB_GODMODE=1
  -DRADIOLIB_STATIC_ONLY=1
  -DNRF52_PLATFORM
  -DBOARD_XIAO_WIO_SX1262
  ; The Adafruit BSP ships no Seeed XIAO variant; we vendor it. Put it on the
  ; GLOBAL include path so framework libs (Uart.h -> variant.h) resolve it too.
  -I variants/Seeed_XIAO_nRF52840
  ; Belt-and-suspenders with lib_ldf_mode=deep+ : force lib/core onto the global
  ; include path so lib/hal's #include "hal.h" always resolves (the Windows failure).
  -I lib/core
  ; control pins -> RadioLib Module(NSS, DIO1, RST, BUSY) ctor (D-aliases)
  -DLORA_PIN_NSS=D4
  -DLORA_PIN_DIO1=D1
  -DLORA_PIN_RST=D2
  -DLORA_PIN_BUSY=D3
  ; board/analog wiring -> read by CustomSX1262::std_init
  -DSX126X_RXEN=D5
  -DSX126X_TXEN=RADIOLIB_NC
  -DSX126X_DIO2_AS_RF_SWITCH=1
  -DSX126X_DIO3_TCXO_VOLTAGE=1.8
  -DSX126X_CURRENT_LIMIT=140
  -DSX126X_RX_BOOSTED_GAIN=1
  ; ---- build-neutral RAM/size switches (2026-06-12 RAM review) ----
  -Wl,-Map=firmware.map            ; emit a link map so memory reviews are EXACT (not struct arithmetic)
  ; compile out the unused TinyUSB device classes — this device is CDC-only (frees ~3 KB RAM IF the BSP
  ; honors the -D; confirm against the map — if overridden, switch to a user tusb_config.h).
  -DCFG_TUD_MSC=0
  -DCFG_TUD_HID=0
  -DCFG_TUD_MIDI=0
  -DCFG_TUD_VENDOR=0
  -DCFG_TUD_VIDEO=0
  ; QSPI inbox-records backend (CustomLFS_QSPIFlash on the XIAO's 2 MB P25Q16H). QSPIFLASH gates the inbox
  ; records FS + MRINBOX_QSPI_READY (device_inbox_store.h); NRFX_QSPI_ENABLED pulls in the nrfx_qspi driver.
  ; NOT EXTRAFS — records are on the SEPARATE QSPI chip, so the on-chip InternalFS (device_nv + inbox meta)
  ; keeps the current ld (nrf52840_s140_v7.ld) untouched. (Adopt the extrafs ld only if begin() needs it.)
  -D QSPIFLASH=1
  -D NRFX_QSPI_ENABLED=1
lib_deps =
  jgromes/RadioLib @ ^7.6.0
  ; inbox device store — external QSPI records FS. CustomLFS_QSPIFlash (oltaco/CustomLFS) is an Adafruit_LittleFS
  ; subclass driving nrfx_qspi directly (no Adafruit_SPIFlash / SdFat -> no TinyUSB SS/File clash); its JEDEC
  ; table already covers the XIAO's P25Q16H. (The naive SPIFlash+SdFat path is a DEAD-END here — do not retry.)
  https://github.com/oltaco/CustomLFS @ 0.2.1

; ----- Heltec WiFi LoRa 32 V3 (backup) -----
[env:heltec_v3]
; PIN the platform (was unpinned) so every machine resolves the SAME builder + toolchain — the same
; <span> story as the nRF52 above. The official `espressif32` ships GCC 8.4 (xtensa): too old for
; C++20 — no <span> header, and it rejects the `gnu++20` spelling (only knows `gnu++2a`). The
; pioarduino fork below BUNDLES arduino-esp32 3.1.3 + GCC 13.2 (has <span>), so it fixes the
; toolchain and the header in one line. 53.03.13 is the version verified to build the Heltec here.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13-1/platform-espressif32.zip
board = heltec_wifi_lora_32_V3
framework = arduino
; lib_ldf_mode = deep+  (commented out — deep+ tries to compile Arduino framework WiFi/LittleFS
;   from source on this pioarduino fork, which fails. The platform resolves its own includes.)
build_src_filter = +<fw_main.cpp> -<sim_main.cpp> +<device_ota.cpp>
upload_protocol = esptool
monitor_speed  = 115200       ; match fw_main Serial.begin(115200)
monitor_dtr    = 0            ; don't reset the board on `pio device monitor` connect (Heltec auto-reset circuit)
; arduino-esp32 appends -std=gnu++17 last on our TUs, overriding gnu++2a (<span>);
; strip it so the framework's gnu++2b (C++23 ⊇ our C++20) wins for lib/core.
build_unflags = -std=gnu++11 -std=gnu++17
build_flags =
  ${common.build_flags}
  -DMESHROUTE_NO_TELEMETRY        ; strip the diagnostic emit blocks (MR_TELEMETRY) from the device build
  -DRADIOLIB_GODMODE=1
  -DRADIOLIB_STATIC_ONLY=1
  -DBOARD_HELTEC_V3
  ; control pins -> RadioLib Module(NSS, DIO1, RST, BUSY) ctor
  -DLORA_PIN_NSS=8
  -DLORA_PIN_DIO1=14
  -DLORA_PIN_RST=RADIOLIB_NC
  -DLORA_PIN_BUSY=13
  ; dedicated SPI bus -> std_init(&SPI) (P_LORA_SCLK present => std_init begins it)
  -DP_LORA_SCLK=9
  -DP_LORA_MISO=11
  -DP_LORA_MOSI=10
  ; board/analog wiring -> read by CustomSX1262::std_init
  -DSX126X_DIO2_AS_RF_SWITCH=true
  -DSX126X_DIO3_TCXO_VOLTAGE=1.8
  -DSX126X_CURRENT_LIMIT=140
  -DSX126X_RX_BOOSTED_GAIN=1
lib_deps =
  jgromes/RadioLib @ ^7.6.0

; ----- Seeed XIAO ESP32-S3 + Wio-SX1262 (B2B-connector kit) -----
; Same radio MODULE as xiao_sx1262 (Wio-SX1262: DIO2 RF switch, 1.8 V TCXO) but on an ESP32-S3 MCU, so it
; reuses heltec_v3's PLATFORM/toolchain (pioarduino espressif32 = arduino-esp32 3.1.3 + GCC 13.2, for <span>/
; C++20) with the XIAO-ESP32S3 board def. PINS are the B2B-connector bottom-pads (raw GPIO, NOT the D0-D10
; header). Verified config: RadioLib Module(41,39,42,40) + setTCXO(1.8) + setDio2AsRfSwitch(true) — see the
; Seeed wiki + RadioLib disc. #1361. Flash: `pio run -e xiao_esp32s3 -t upload`. Not in default_envs.
[env:xiao_esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13-1/platform-espressif32.zip
board = seeed_xiao_esp32s3
framework = arduino
build_src_filter = +<fw_main.cpp> -<sim_main.cpp> +<device_ota.cpp>
upload_protocol = esptool
monitor_speed  = 115200
monitor_dtr    = 0            ; don't reset on monitor-connect (ESP32-S3 native-USB CDC)
build_unflags = -std=gnu++11 -std=gnu++17   ; let lib/core keep gnu++2a (<span>); same as heltec_v3
build_flags =
  ${common.build_flags}
  -DMESHROUTE_NO_TELEMETRY
  -DRADIOLIB_GODMODE=1
  -DRADIOLIB_STATIC_ONLY=1
  -DBOARD_XIAO_ESP32S3
  ; Wio-SX1262 B2B control pins (raw GPIO of the bottom-pad B2B connector) -> Module(NSS, DIO1, RST, BUSY)
  -DLORA_PIN_NSS=41
  -DLORA_PIN_DIO1=39
  -DLORA_PIN_RST=42
  -DLORA_PIN_BUSY=40
  ; dedicated SPI bus -> std_init(&SPI) begins it (P_LORA_SCLK present => the &SPI path in fw_main)
  -DP_LORA_SCLK=7
  -DP_LORA_MISO=8
  -DP_LORA_MOSI=9
  ; Wio-SX1262 analog wiring (same module as the nRF52 build) -> read by CustomSX1262::std_init
  -DSX126X_DIO2_AS_RF_SWITCH=true
  -DSX126X_DIO3_TCXO_VOLTAGE=1.8
  -DSX126X_CURRENT_LIMIT=140
  -DSX126X_RX_BOOSTED_GAIN=1
  ; ⚠ RF-SWITCH VERIFY-POINT: the verified B2B RadioLib example drives the antenna via DIO2 ONLY (above), so
  ; NO external RXEN is set here. The docs also mention an ANT_SW on GPIO38 — if RX/TX is DEAD on metal, the
  ; fallback is to add `-DSX126X_RXEN=38 -DSX126X_TXEN=RADIOLIB_NC` (the nRF52 build's RXEN+DIO2 pattern) OR
  ; drive GPIO38 HIGH in setup(). Check the Wio-SX1262 schematic. Seeed's own docs are thin here.
lib_deps =
  jgromes/RadioLib @ ^7.6.0

; (The old `xiao_node2` env is gone: node_id is no longer a build flag — it comes from NV / join.
;  Flash the SAME xiao_sx1262 build to both boards, then provision each:  cfg set node_id <1..254>  + reboot.)

; ----- Gateway build (dual-layer cross-layer bridge, 2026-06-12-gateway-dual-layer-design.md) -----
; A gateway is NOT a board — it's a BOARD-AGNOSTIC flag delta (below) layered onto ANY device env. A
; gateway is a full citizen of TWO layers on ONE identity (one radio time-multiplexed across the two
; layers — Slice 3+). MR_N_LAYERS=2 allocates a second LayerRuntime (~80 KB), so the build cuts the
; gossip FIFO HARD: a gateway SKIPS the channel gossip plane (Principle 11), so cap_channel_buffer is
; dead weight — dropping 128->8 reclaims ~60 KB across both layers (the dominant cost), cap_deferred_sends
; 32->16 trims more; cap_routes stays FULL (254), no routing sacrifice. The cuts are CORRECTNESS-aligned
; (the buffer is unused on a gateway), so they're right on every board; they're RAM-CRITICAL on the XIAO
; nRF52 (~235 KB -> 73% vs 98.6% with full caps) and free headroom on the ESP32 targets (512 KB + PSRAM).
;
; Compose onto a board with `extends = env:<board>` + `${gateway_flags.build_flags}`. The flags live in
; this shared fragment so every per-board gateway env stays DRY (one source of truth). NB build_flags do
; NOT auto-merge across extends — each env re-lists ${env:<board>.build_flags} ${gateway_flags.build_flags}.
[gateway_flags]
build_flags =
  -DMR_N_LAYERS=2
  -DMR_GATEWAY_BUILD=1          ; DEDICATED gateway firmware — on_init REFUSES n_layers<2 (the cap_channel_buffer=8 cut
                               ; is only safe when the channel plane is actually skipped, i.e. n_layers==2). NB:
                               ; the native test env is also MR_N_LAYERS=2 but does NOT define this, so it still runs
                               ; single-layer tests; the refuse is keyed on this build flag, not on MR_N_LAYERS.
  -DMR_CAP_CHANNEL_BUFFER=8     ; gateway skips gossip (Principle 11) — reclaims the second layer's RAM
  -DMR_CAP_DEFERRED_SENDS=16

; nRF52 XIAO gateway — the original; the `gateway` NAME is kept (docs/configuring-a-gateway.md + the
; 3-board gate `pio run -e gateway -e xiao_sx1262 -e heltec_v3` reference it). NOT in default_envs.
[env:gateway]
extends = env:xiao_sx1262
build_flags =
  ${env:xiao_sx1262.build_flags}
  ${gateway_flags.build_flags}

; Heltec WiFi LoRa 32 V3 gateway.
[env:gateway_heltec]
extends = env:heltec_v3
build_flags =
  ${env:heltec_v3.build_flags}
  ${gateway_flags.build_flags}

; Seeed XIAO ESP32-S3 + Wio-SX1262 gateway.
[env:gateway_esp32s3]
extends = env:xiao_esp32s3
build_flags =
  ${env:xiao_esp32s3.build_flags}
  ${gateway_flags.build_flags}
